<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENHYPEN — Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;700&family=Syne+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #080808;
      --s1:     #0f0f0f;
      --s2:     #171717;
      --s3:     #202020;
      --acc:    #c6f135;
      --acc2:   rgba(198,241,53,0.12);
      --text:   #efefef;
      --dim:    #555;
      --dim2:   #888;
      --border: rgba(255,255,255,0.07);

      /* era accent colors */
      --border-clr:    #4fc3f7;
      --dimension-clr: #b39ddb;
      --manifesto-clr: #ef9a9a;
      --romance-clr:   #f48fb1;
      --horizon-clr:   #c6f135;
      --special-clr:   #ffd54f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

    /* ─── Layout ──────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: 58px 1fr 108px;
      grid-template-columns: 320px 1fr;
      grid-template-areas: "hd hd" "sb mn" "pb pb";
      height: 100vh;
    }

    /* ─── Header ──────────────────────────────────────────── */
    header {
      grid-area: hd;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 28px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 7px;
      color: var(--acc);
      line-height: 1;
      flex-shrink: 0;
    }

    .sep { width: 1px; height: 24px; background: var(--border); }

    .tagline { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--dim); }

    .now-header {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 420px;
      min-width: 0;
    }

    .nh-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--acc);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .nh-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .nh-album {
      font-size: 11px;
      color: var(--dim2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    /* ─── Sidebar ─────────────────────────────────────────── */
    aside {
      grid-area: sb;
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Era filter tabs */
    .era-tabs {
      display: flex;
      overflow-x: auto;
      gap: 4px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .era-tabs::-webkit-scrollbar { display: none; }

    .era-tab {
      flex-shrink: 0;
      padding: 4px 12px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--dim2);
      cursor: pointer;
      background: none;
      font-family: 'Syne', sans-serif;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .era-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .era-tab.active {
      background: var(--acc2);
      border-color: var(--acc);
      color: var(--acc);
    }

    /* Song list */
    .song-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--s3) transparent;
    }
    .song-list::-webkit-scrollbar { width: 4px; }
    .song-list::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 2px; }

    /* Album group */
    .album-group { border-bottom: 1px solid var(--border); }

    .album-header {
      position: sticky;
      top: 0;
      background: var(--s1);
      padding: 10px 16px 8px;
      z-index: 2;
      border-bottom: 1px solid var(--border);
    }

    .album-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--dim2);
    }

    .album-year {
      font-family: 'Syne Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      margin-top: 1px;
    }

    /* Era color bar on album header */
    .album-header::before {
      content: '';
      display: block;
      width: 20px;
      height: 2px;
      margin-bottom: 6px;
    }

    [data-era="border"]     .album-header::before { background: var(--border-clr); }
    [data-era="dimension"]  .album-header::before { background: var(--dimension-clr); }
    [data-era="manifesto"]  .album-header::before { background: var(--manifesto-clr); }
    [data-era="romance"]    .album-header::before { background: var(--romance-clr); }
    [data-era="new-horizon"].album-header::before { background: var(--horizon-clr); }
    [data-era="special"]    .album-header::before { background: var(--special-clr); }

    /* Song rows */
    .song-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px 9px 20px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .song-row:hover { background: var(--s2); }
    .song-row.active { background: rgba(198,241,53,0.07); }

    .song-row.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--acc);
    }

    .sr-num {
      font-family: 'Syne Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .song-row.active .sr-num { color: var(--acc); }

    .sr-title {
      font-size: 12.5px;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-row.active .sr-title { color: var(--acc); }

    /* Title track dot */
    .sr-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      opacity: 0;
    }

    .song-row.is-title .sr-dot { opacity: 1; }
    .song-row.active .sr-dot { background: var(--acc); opacity: 1; }

    /* Equalizer icon */
    .eq { display: none; align-items: flex-end; gap: 1.5px; height: 12px; flex-shrink: 0; }
    .song-row.active .eq { display: flex; }

    .eq span { width: 2px; background: var(--acc); border-radius: 1px; }
    .song-row.active.playing .eq span { animation: eq 0.65s ease-in-out infinite alternate; }
    .eq span:nth-child(1) { height: 4px;  animation-delay: 0s;    }
    .eq span:nth-child(2) { height: 9px;  animation-delay: 0.15s; }
    .eq span:nth-child(3) { height: 6px;  animation-delay: 0.3s;  }

    @keyframes eq {
      from { transform: scaleY(0.3); transform-origin: bottom; }
      to   { transform: scaleY(1);   transform-origin: bottom; }
    }

    /* Hidden when era filtered */
    .album-group.hidden { display: none; }

    /* ─── Main ────────────────────────────────────────────── */
    main {
      grid-area: mn;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow */
    main::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(198,241,53,0.045) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Album art */
    .art-wrap { width: 220px; height: 220px; position: relative; flex-shrink: 0; }

    .art-inner {
      position: absolute; inset: 0;
      background: var(--s2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .art-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 46px;
      letter-spacing: 8px;
      color: rgba(198,241,53,0.1);
      user-select: none;
    }

    /* Scanline overlay */
    .art-inner::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
    }

    .art-ring {
      position: absolute; inset: -10px;
      border: 1px solid transparent;
      pointer-events: none;
      transition: border-color 0.5s;
    }

    .art-ring-2 {
      position: absolute; inset: -22px;
      border: 1px solid transparent;
      pointer-events: none;
      transition: border-color 0.5s;
    }

    .art-wrap.playing .art-ring {
      border-color: rgba(198,241,53,0.4);
      animation: ring1 2.5s ease-in-out infinite;
    }

    .art-wrap.playing .art-ring-2 {
      border-color: rgba(198,241,53,0.15);
      animation: ring2 3s ease-in-out infinite;
    }

    @keyframes ring1 {
      0%,100%{ inset: -10px; opacity:1; }
      50%     { inset: -16px; opacity:0.35; }
    }
    @keyframes ring2 {
      0%,100%{ inset: -22px; opacity:1; }
      50%     { inset: -30px; opacity:0.2; }
    }

    /* Track info */
    .track-info { text-align: center; z-index: 1; }

    .track-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
      max-width: 480px;
    }

    .track-album {
      margin-top: 6px;
      font-size: 12px;
      color: var(--dim2);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .track-era {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--dim);
    }

    /* No song selected state */
    .idle-state {
      text-align: center;
      z-index: 1;
    }

    .idle-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 12px;
      color: rgba(198,241,53,0.08);
      line-height: 1;
    }

    .idle-sub {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* Error toast */
    #toast {
      position: fixed;
      bottom: 130px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ff6b6b;
      font-size: 12px;
      padding: 8px 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 99;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }

    /* ─── Player bar ──────────────────────────────────────── */
    .player-bar {
      grid-area: pb;
      background: var(--s1);
      border-top: 1px solid var(--border);
      padding: 14px 36px 18px;
    }

    .prog-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .tc {
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      width: 36px;
      flex-shrink: 0;
    }
    .tc.r { text-align: right; }

    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--s3);
      cursor: pointer;
      position: relative;
      transition: height 0.1s;
    }
    .prog-track:hover { height: 5px; }

    .prog-fill {
      height: 100%;
      background: var(--acc);
      width: 0%;
      pointer-events: none;
      transition: width 0.1s linear;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .ctrl {
      background: none; border: none;
      color: var(--dim); cursor: pointer;
      font-size: 19px; line-height: 1;
      padding: 6px;
      transition: color 0.15s, transform 0.1s;
    }
    .ctrl:hover { color: var(--text); transform: scale(1.15); }

    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--acc);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #000; font-size: 20px;
      transition: transform 0.12s, opacity 0.15s;
    }
    .play-btn:hover { transform: scale(1.06); opacity: 0.9; }

    .vol-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto;
    }

    .vol-icon { font-size: 15px; color: var(--dim); cursor: pointer; }

    input[type=range] {
      -webkit-appearance: none;
      width: 84px; height: 3px;
      background: var(--s3); outline: none;
      cursor: pointer; border-radius: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%; background: var(--acc); cursor: pointer;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo">ENHYPEN</div>
    <div class="sep"></div>
    <div class="tagline">Complete Discography</div>
    <div class="now-header" id="nowHeader" style="display:none;">
      <div class="nh-dot" id="nhDot" style="display:none;"></div>
      <div class="nh-title" id="nhTitle"></div>
      <div class="nh-album" id="nhAlbum"></div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside>
    <div class="era-tabs" id="eraTabs"></div>
    <div class="song-list" id="songList"></div>
  </aside>

  <!-- MAIN -->
  <main id="mainArea">
    <div class="idle-state" id="idleState">
      <div class="idle-logo">ENHYPEN</div>
      <div class="idle-sub">Select a song to play</div>
    </div>

    <div id="trackDisplay" style="display:none; flex-direction:column; align-items:center; gap:28px;">
      <div class="art-wrap" id="artWrap">
        <div class="art-inner">
          <div class="art-text">ENHYPEN</div>
        </div>
        <div class="art-ring"></div>
        <div class="art-ring-2"></div>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitle"></div>
        <div class="track-album" id="trackAlbum"></div>
        <div class="track-era"   id="trackEra"></div>
      </div>
    </div>
  </main>

  <!-- PLAYER BAR -->
  <div class="player-bar">
    <div class="prog-row">
      <div class="tc" id="tCur">0:00</div>
      <div class="prog-track" id="progTrack" onclick="seek(event)">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <div class="tc r" id="tTot">0:00</div>
      <div class="vol-wrap">
        <div class="vol-icon" onclick="toggleMute()">&#128266;</div>
        <input type="range" id="vol" min="0" max="1" step="0.02" value="1" oninput="setVol(this.value)" />
      </div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl" title="Previous  ←" onclick="prev()">&#9664;&#9664;</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl" title="Next  →" onclick="next()">&#9654;&#9654;</button>
    </div>
  </div>

</div>

<div id="toast"></div>
<audio id="audio"></audio>

<script>
  let data      = null;
  let flatSongs = [];   // { title, file, album, era, eraId, isTitle, globalIndex }
  let cur       = -1;
  let muted     = false;
  let prevVol   = 1;
  const audio   = document.getElementById('audio');
  let activeEra = 'all';

  /* ── Load data ── */
  fetch('songs.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(json => { data = json; init(); })
    .catch(() => showToast('Could not load songs.json — make sure it is in the same folder.'));

  function init() {
    // Build flat songs array
    let gi = 0;
    data.eras.forEach(era => {
      era.albums.forEach(album => {
        album.songs.forEach(s => {
          flatSongs.push({
            title:  s.title,
            file:   'songs/' + s.file,
            album:  album.name,
            year:   album.year,
            era:    era.name,
            eraId:  era.id,
            isTitle: !!s.title_track,
            globalIndex: gi++
          });
        });
      });
    });

    buildEraTabs();
    buildSongList();
  }

  /* ── Era filter tabs ── */
  function buildEraTabs() {
    const tabs = document.getElementById('eraTabs');
    tabs.innerHTML = '';

    const allBtn = makeTab('all', 'All');
    tabs.appendChild(allBtn);

    data.eras.forEach(era => {
      tabs.appendChild(makeTab(era.id, era.name));
    });
  }

  function makeTab(id, label) {
    const btn = document.createElement('button');
    btn.className = 'era-tab' + (id === activeEra ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => filterEra(id);
    btn.dataset.eraId = id;
    return btn;
  }

  function filterEra(id) {
    activeEra = id;
    document.querySelectorAll('.era-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.eraId === id);
    });
    document.querySelectorAll('.album-group').forEach(g => {
      g.classList.toggle('hidden', id !== 'all' && g.dataset.era !== id);
    });
  }

  /* ── Build song list ── */
  function buildSongList() {
    const list = document.getElementById('songList');
    list.innerHTML = '';

    data.eras.forEach(era => {
      era.albums.forEach(album => {
        const group = document.createElement('div');
        group.className = 'album-group';
        group.dataset.era = era.id;

        // Album header
        const hdr = document.createElement('div');
        hdr.className = 'album-header';
        hdr.innerHTML = `<div class="album-name">${album.name}</div><div class="album-year">${album.year} · ${era.name}</div>`;
        group.appendChild(hdr);

        // Songs
        album.songs.forEach((s, i) => {
          const gi = flatSongs.findIndex(x => x.file === 'songs/' + s.file && x.album === album.name);
          const row = document.createElement('div');
          row.className = 'song-row' + (s.title_track ? ' is-title' : '');
          row.id = `sr-${gi}`;
          row.innerHTML = `
            <div class="sr-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="sr-title" title="${s.title}">${s.title}</div>
            <div class="sr-dot"></div>
            <div class="eq"><span></span><span></span><span></span></div>`;
          row.onclick = () => play(gi);
          group.appendChild(row);
        });

        list.appendChild(group);
      });
    });
  }

  /* ── Playback ── */
  function play(index) {
    if (index < 0 || index >= flatSongs.length) return;

    // Deactivate old
    if (cur >= 0) {
      document.getElementById(`sr-${cur}`)?.classList.remove('active', 'playing');
    }

    cur = index;
    const s = flatSongs[cur];

    // Activate new row
    const row = document.getElementById(`sr-${cur}`);
    if (row) {
      row.classList.add('active');
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Update main display
    document.getElementById('idleState').style.display     = 'none';
    document.getElementById('trackDisplay').style.display  = 'flex';
    document.getElementById('trackTitle').textContent      = s.title;
    document.getElementById('trackAlbum').textContent      = s.album;
    document.getElementById('trackEra').textContent        = s.era + ' · ' + s.year;

    // Header mini-player
    document.getElementById('nowHeader').style.display = 'flex';
    document.getElementById('nhTitle').textContent     = s.title;
    document.getElementById('nhAlbum').textContent     = s.album;

    // Load audio
    audio.src = s.file;
    audio.load();
    audio.play().catch(() => {
      showToast(`"${s.title}" — file not found in songs/ folder`);
    });
  }

  function togglePlay() {
    if (cur < 0) return;
    audio.paused ? audio.play() : audio.pause();
  }

  function next() {
    if (!flatSongs.length) return;
    play((cur + 1) % flatSongs.length);
  }

  function prev() {
    if (!flatSongs.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    play((cur - 1 + flatSongs.length) % flatSongs.length);
  }

  function seek(e) {
    if (!audio.duration) return;
    const r = document.getElementById('progTrack').getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
  }

  function setVol(v) {
    audio.volume = parseFloat(v);
    muted = audio.volume === 0;
  }

  function toggleMute() {
    if (muted) {
      audio.volume = prevVol;
      document.getElementById('vol').value = prevVol;
    } else {
      prevVol = audio.volume;
      audio.volume = 0;
      document.getElementById('vol').value = 0;
    }
    muted = !muted;
  }

  /* ── Audio events ── */
  audio.addEventListener('play', () => {
    document.getElementById('playBtn').innerHTML   = '&#9646;&#9646;';
    document.getElementById('artWrap').classList.add('playing');
    document.getElementById('nhDot').style.display = 'block';
    document.getElementById(`sr-${cur}`)?.classList.add('playing');
  });

  audio.addEventListener('pause', () => {
    document.getElementById('playBtn').innerHTML    = '&#9654;';
    document.getElementById('artWrap').classList.remove('playing');
    document.getElementById('nhDot').style.display  = 'none';
    document.getElementById(`sr-${cur}`)?.classList.remove('playing');
  });

  audio.addEventListener('ended', next);

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    document.getElementById('progFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('tCur').textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('tTot').textContent = fmt(audio.duration);
  });

  function fmt(s) {
    return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
  }

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }

  /* ── Keyboard ── */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') next();
    if (e.code === 'ArrowLeft')  prev();
    if (e.code === 'KeyM')       toggleMute();
  });
</script>
</body>
</html>
